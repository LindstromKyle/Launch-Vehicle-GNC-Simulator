name: Docker Build

on:
  push:
    paths:
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - requirements-dev.txt
      - src/**
      - .github/workflows/docker-build.yml
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - requirements-dev.txt
      - src/**
      - .github/workflows/docker-build.yml
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: launch-gnc-simulator:ci
