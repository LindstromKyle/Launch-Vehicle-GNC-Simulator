<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GNC Live Telemetry</title>
    <link rel="stylesheet" href="/simulations/live/assets/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1 class="title">Live Telemetry Viewer</h1>
            <p class="subtitle">Real-time telemetry stream — launch vehicle or W-series constellation.</p>
        </header>

        <section class="controls">
            <input id="runId" placeholder="run_id (leave empty to start a new run)" />
            <button id="startBtn" class="constellation-btn">Launch Rocket</button>
            <button id="constellationBtn" class="constellation-btn">Launch Constellation</button>
            <button id="connectBtn">Connect Existing</button>
            <button id="disconnectBtn">Disconnect</button>
            <button id="clearBtn">Clear Log</button>
        </section>

        <section class="kpis">
            <div class="kpi">
                <div class="kpi-label">Connection</div>
                <div id="connState" class="kpi-value">idle</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Current Phase</div>
                <div id="phaseValue" class="kpi-value">-</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Altitude (km)</div>
                <div id="altValue" class="kpi-value">-</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Speed (km/s)</div>
                <div id="spdValue" class="kpi-value">-</div>
            </div>
        </section>

        <div id="vehicleTabs" class="vehicle-tabs" style="display:none;"></div>

        <section class="charts">
            <div class="panel">
                <h2>Altitude vs Time</h2>
                <div class="chart-wrap">
                    <canvas id="altChart"></canvas>
                </div>
            </div>
            <div class="panel">
                <h2>Speed vs Time</h2>
                <div class="chart-wrap">
                    <canvas id="spdChart"></canvas>
                </div>
            </div>
        </section>

        <section class="panel orbit-panel">
            <h2>3D Orbit View</h2>
            <div id="orbitPlot" class="orbit-plot"></div>
        </section>

        <section class="ops-panels">
            <section class="panel command-panel">
                <h2>Send Command</h2>
                <p class="panel-subtitle">Targets the currently viewed constellation satellite.</p>
                <div class="command-grid">
                    <label class="field-label" for="cmdAction">Command</label>
                    <select id="cmdAction">
                        <option value="deorbit_burn">Deorbit Burn</option>
                    </select>

                    <label class="field-label" for="cmdExecuteAt">Execute At Sim Time (s)</label>
                    <input id="cmdExecuteAt" type="number" min="0" step="1" value="4500" />

                    <label class="field-label" for="cmdTargetPerigee">Target Perigee Altitude (km)</label>
                    <input id="cmdTargetPerigee" type="number" min="1" max="200" step="1" value="50" />

                    <button id="sendCommandBtn" class="constellation-btn">Send Command</button>
                </div>
            </section>

            <section class="panel">
                <h2>Event Log</h2>
                <div id="log" class="log"></div>
            </section>
        </section>
    </div>

    <script src="/simulations/live/assets/app.js"></script>
</body>

</html>
